<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* Title */
h2{
text-align:center;
padding:20px 0;
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* Menu links */
a{
display:block;
padding:15px 20px;
margin:10px;
color:white;
text-decoration:none;
border-radius:10px;
transition:0.3s;
}

/* Hover effect */
a:hover{
background:#ff4b2b;
transform:translateX(5px);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* Active glow effect */
a:active{
background:#ff2a00;
}
</style>
</head>

<body>

<h2>📋 Menu</h2>

<a href="dashboard.html" target="content">📊 Dashboard</a>

<a href="login.html" target="content">🚨 Report Disaster</a>

<a href="gallery.html" target="content">🖼 Gallery</a>

<a href="map.html" target="content">🗺 Map</a>

</body>
</html>
