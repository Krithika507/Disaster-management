<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;

/* Background */
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21");

background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
width:300px;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:8px;
}

button{
background:#ff4b2b;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff2a00;
}
</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Login</h2>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>

<button onclick="login()">Login</button>

</div>

<script>
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

/* simple demo login */
if(u === "admin" && p === "1234"){
window.location.href = "report.html";
}
else{
alert("Invalid login!");
}
}
</script>

</body>
</html>
