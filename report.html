<!DOCTYPE html>
<html>
<head>
<title>Report Disaster</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;

/* Background image + soft overlay */
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21");

background-size:cover;
background-position:center;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Form Card */
.form-container{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
text-align:center;
animation:fadeIn 1.5s ease;
}

h2{
margin-bottom:20px;
}

/* Inputs */
input, select, textarea{
width:90%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
}

input::placeholder,
textarea::placeholder{
color:#ddd;
}

/* Focus effect */
input:focus, textarea:focus, select:focus{
background:rgba(255,255,255,0.35);
}

/* Button */
button{
margin-top:15px;
padding:12px 25px;
background:#ff4b2b;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2a00;
}

/* Animation */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="form-container">

<h2>🚨 Report a Disaster</h2>

<form onsubmit="event.preventDefault();alert('Report Submitted Successfully!');">

<input type="text" placeholder="Disaster Type" required>

<input type="text" placeholder="Location" required>

<select required>
<option value="">Select Severity</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea rows="4" placeholder="Describe the situation..." required></textarea>

<button type="submit">Submit Report</button>

</form>

</div>

</body>
</html>
